<html>
<head meta-charset="UTF-8">
<title>Meu formulario</title>
</head>
<body>
<h1>Formulário</h1>
<form action ="/submit-item methode:"POST">
<fieldset>
<legend>Informações de hardware</legend>
<label for= "nome">Nome do dispositivo: </label>
<input type= "text" ID=NOME NAME="NOME" place holder="EX: Teclado Logitech" required> 
<label for="Fornecedor"> e-mail do fornecedor </label>
<input type ="Email" ID="Fornecedor" name ="Fornecedor" required>
<label for "manual"> Link do manual URL:</label>
<input type="URL" ID="manual" name="manual">
<label for="suport">Telefone de suporte</label>
<input type="tel" id="suport" name="suporte" pattern "[0-9]{2}[0-9]{5}-[0-9]{4} place holder"47 9999-9999">
</fieldset>
<fieldset> <legend> Especificações e prazos </legend>
  <label for "QTD"> Quantidade em estoque : </label>
<input type="number"  ID="QTD" name="QTD" min="0" Max ="1000" Value ="1">
<label for="pontos" Nivel de performance (1 A 10):</label>
 <input type ="range" ID="pontos" min="1" Max="10">
<label for ="aquisição"> Data de compra: </label>
<input type="date ID" aquisiçãp>
</body> 

</html>
